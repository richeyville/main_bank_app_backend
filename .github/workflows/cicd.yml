Continuous-Update_k8s_manifest:
    runs-on: ubuntu-latest
    needs: Continuous-Integration_build_and_push
    env:
      ECR_REGISTRY: 793524670489.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: main_bank_app_backend
      IMAGE_TAG: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/richeyville/Bank-kubernetes-manifest.git

      - name: Configure Git
        run: |
          git config --global user.email "richieinneh@gmail.com"
          git config --global user.name "richeyville"

      - name: Update image tag in deployment
        working-directory: Bank-kubernetes-manifest
        run: |
          sed -i "s|$ECR_REGISTRY/$ECR_REPOSITORY:.*|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
              bank-project/backendapi.yaml

      - name: Commit and push changes
        working-directory: Bank-kubernetes-manifest
        env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
        run: |
          git remote set-url origin https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/richeyville/Bank-kubernetes-manifest.git
          git add bank-project/backendapi.yaml
          git commit -m "Update backend image to version $IMAGE_TAG" || echo "No changes to commit"
          git push origin main
