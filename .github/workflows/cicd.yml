name: Bank Backend Pipeline

on:
  push:
    branches:
      - main

jobs:

  Continuous-Integration_build_and_push:
    runs-on: ubuntu-latest

    env:
      ECR_REGISTRY: 793524670489.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: main_bank_app_backend
      AWS_REGION: us-east-1
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Push Docker images to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Clean up Docker images locally
        if: always()
        run: |
          docker rmi $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG || true
          docker rmi $ECR_REGISTRY/$ECR_REPOSITORY:latest || true


  Continuous-Update_k8s_manifest:
    runs-on: ubuntu-latest
    needs: Continuous-Integration_build_and_push

    env:
      ECR_REGISTRY: 793524670489.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: main_bank_app_backend
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout Kubernetes manifest repo
        uses: actions/checkout@v4
        with:
          repository: richeyvilleproject/kubernetes-manifest
          token: ${{ secrets.GIT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "richieinneh@gmail.com"
          git config user.name "richeyville"

      - name: Update image tag in deployment
        run: |
          sed -i "s|$ECR_REGISTRY/$ECR_REPOSITORY:.*|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" ./bank-project/backendapi.yaml

      - name: Commit and push changes
        run: |
          git add bank-project/backendapi.yaml
          git commit -m "Update backend image to version $IMAGE_TAG" || echo "No changes to commit"
          git push origin main
